<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>微信</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <link rel="stylesheet" href="/assets/css/theme-phone.css" />
</head>
<body data-site="phone">
  <div class="phone-frame">
    <div class="phone-notch" aria-hidden="true"></div>
    <div class="phone-screen wx-app">
      <div class="phone-status">
        <span>中国移动</span>
        <span class="phone-status-time">22:17</span>
        <span class="phone-status-icons" aria-hidden="true">
          <i class="sig"></i><i class="wifi"></i><i class="bat"></i>
        </span>
      </div>

      <div class="wx-top">
        <a class="wx-back" href="/phone/" aria-label="返回桌面">‹</a>
        <div class="wx-title">微信</div>
        <div class="wx-right" aria-hidden="true">＋</div>
      </div>

      <div class="wx-body">
        <div class="wx-search">搜索</div>
        <div class="wx-list">
          <a class="wx-item" href="/phone/chat-lin.html">
            <img class="wx-avatar av-lin" src="/assets/img/lin-avatar.png" alt="" width="48" height="48" style="object-fit:cover" onerror="this.outerHTML='<div class=\\'wx-avatar av-lin\\' aria-hidden=\\'true\\'>屿</div>'" />
            <div class="wx-item-main">
              <div class="wx-item-row">
                <span class="wx-item-name">林屿</span>
                <span class="wx-item-time">昨天</span>
              </div>
              <div class="wx-item-row">
                <span class="wx-item-preview unread">别担心。</span>
                <span class="wx-item-meta"><span class="wx-badge">1</span></span>
              </div>
            </div>
          </a>
          <a class="wx-item" href="/phone/chat-chen.html">
            <div class="wx-avatar av-chen" aria-hidden="true">默</div>
            <div class="wx-item-main">
              <div class="wx-item-row">
                <span class="wx-item-name">陈默</span>
                <span class="wx-item-time">周一</span>
              </div>
              <div class="wx-item-preview">你别只看朋友圈</div>
            </div>
          </a>
        </div>
      </div>

      <nav class="wx-tabs" aria-label="微信导航">
        <a class="wx-tab active" href="/phone/wechat.html">
          <span class="ico" aria-hidden="true">💬</span>
          <span>微信</span>
        </a>
        <a class="wx-tab" href="/phone/contacts.html">
          <span class="ico" aria-hidden="true">👥</span>
          <span>通讯录</span>
        </a>
        <a class="wx-tab" href="/phone/moments.html">
          <span class="ico" aria-hidden="true">◉</span>
          <span>发现</span>
        </a>
        <a class="wx-tab" href="/phone/me.html">
          <span class="ico" aria-hidden="true">◎</span>
          <span>我</span>
        </a>
      </nav>
    </div>
  </div>
  <script type="module">
    import { boot } from '/assets/js/nav.js';
    boot('wechat');
  </script>
</body>
</html>
