<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>手机</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <link rel="stylesheet" href="/assets/css/theme-phone.css" />
</head>
<body data-site="phone">
  <div class="phone-frame">
    <div class="phone-notch" aria-hidden="true"></div>
    <div class="phone-screen">
      <div class="phone-status">
        <span>中国移动</span>
        <span class="phone-status-time">22:17</span>
        <span class="phone-status-icons" aria-hidden="true">
          <i class="sig"></i><i class="wifi"></i><i class="bat"></i>
        </span>
      </div>

      <div class="phone-home">
        <div class="phone-clock" aria-hidden="true">
          <div class="phone-time">22:17</div>
          <div class="phone-date">3月24日 星期二</div>
        </div>

        <p class="phone-hint">没有新的通知 · 有些对话很久没动过了</p>

        <div class="phone-apps">
          <a class="phone-app" href="/phone/xhs.html">
            <span class="ico ico-xhs" aria-hidden="true">书</span>
            <span class="label">小红书</span>
          </a>
        </div>

        <nav class="phone-dock" aria-label="常用应用">
          <a class="phone-app" href="/phone/wechat.html">
            <span class="ico ico-wechat" aria-hidden="true">微</span>
            <span class="label">微信</span>
          </a>
          <a class="phone-app" href="/phone/mail.html">
            <span class="ico ico-mail" aria-hidden="true">邮</span>
            <span class="label">邮件</span>
          </a>
          <a class="phone-app" href="/phone/browser.html">
            <span class="ico ico-browser" aria-hidden="true">览</span>
            <span class="label">浏览器</span>
          </a>
          <a class="phone-app" href="/phone/phone.html">
            <span class="ico ico-phone" aria-hidden="true">电</span>
            <span class="label">电话</span>
          </a>
        </nav>
      </div>
    </div>
  </div>
  <script type="module">
    import { boot } from '/assets/js/nav.js';
    boot('phone-home');
  </script>
</body>
</html>
