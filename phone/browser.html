<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>浏览器</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <link rel="stylesheet" href="/assets/css/theme-phone.css" />
</head>
<body data-site="phone">
  <div class="phone-frame">
    <div class="phone-notch" aria-hidden="true"></div>
    <div class="phone-screen light-app">
      <div class="phone-status">
        <span>中国移动</span>
        <span class="phone-status-time">22:17</span>
        <span class="phone-status-icons" aria-hidden="true">
          <i class="sig"></i><i class="wifi"></i><i class="bat"></i>
        </span>
      </div>

      <div class="ph-top">
        <a class="ph-back" href="/phone/" aria-label="返回桌面">‹ 桌面</a>
        <div class="ph-title">浏览器</div>
        <div class="ph-right" aria-hidden="true"></div>
      </div>

      <div class="browser-bar">
        <form id="browser-form" action="#" method="get" autocomplete="off">
          <input
            id="browser-url"
            type="text"
            name="url"
            inputmode="url"
            spellcheck="false"
            placeholder="搜索或输入网址"
            aria-label="地址栏"
          />
          <button type="submit">前往</button>
        </form>
      </div>

      <div class="browser-pane" id="browser-pane">
        <p class="hero">开始浏览</p>
        <p class="sub" id="browser-sub">
          从邮件、笔记或新闻里抄网址到地址栏。本页不会预置任何机构站点，也不会在打开时自动跳转。
        </p>
        <div class="err" id="browser-err" role="alert"></div>
        <ul class="browser-history" id="browser-history" aria-label="历史记录"></ul>
        <p class="sub" id="browser-hist-empty" style="margin-top:12px">
          历史记录为空。从邮件或小红书点开的链接会预填在上方，需点「前往」才会打开。
        </p>
      </div>
    </div>
  </div>
  <script type="module">
    import { boot } from '/assets/js/nav.js';
    boot('browser');

    const ROUTES = [
      { test: /linjiang\.gov/i, to: '/city/', label: '临江市人民政府' },
      { test: /home-serene|xinyuan|幸福家园/i, to: '/home/', label: '幸福家园' },
      { test: /hongke|弘科/i, to: '/hongke/', label: '弘科生物' },
      { test: /lj-bar|临江吧/i, to: '/bar/', label: '临江吧' },
    ];

    const HIST_KEY = 'linjiangBrowserHistory';
    const input = document.getElementById('browser-url');
    const form = document.getElementById('browser-form');
    const err = document.getElementById('browser-err');
    const list = document.getElementById('browser-history');
    const empty = document.getElementById('browser-hist-empty');
    const sub = document.getElementById('browser-sub');

    function showError(msg) {
      err.textContent = msg;
      err.classList.add('show');
    }

    function clearError() {
      err.textContent = '';
      err.classList.remove('show');
    }

    function resolve(raw) {
      const q = String(raw || '').trim();
      if (!q) return null;
      for (const r of ROUTES) {
        if (r.test.test(q)) return r;
      }
      return null;
    }

    function loadHist() {
      try {
        return JSON.parse(localStorage.getItem(HIST_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function saveHist(entry) {
      const cur = loadHist().filter((x) => x.url !== entry.url);
      cur.unshift(entry);
      localStorage.setItem(HIST_KEY, JSON.stringify(cur.slice(0, 8)));
    }

    function renderHist() {
      const items = loadHist();
      list.innerHTML = '';
      if (!items.length) {
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      for (const it of items) {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#';
        a.dataset.url = it.url;
        a.innerHTML = `${it.label || it.url}<span>${it.url.replace(/^https?:\/\//, '')}</span>`;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          input.value = it.url;
          navigate(it.url);
        });
        li.appendChild(a);
        list.appendChild(li);
      }
    }

    function navigate(raw) {
      clearError();
      const hit = resolve(raw);
      if (!hit) {
        showError('无法打开此网页。请检查地址是否正确（可从邮件、笔记或新闻里核对）。');
        return;
      }
      const url = String(raw).trim();
      saveHist({ url, label: hit.label, to: hit.to });
      window.open(hit.to, '_blank', 'noopener,noreferrer');
    }

    // Prefill from ?url= — do not auto-jump on load
    const params = new URLSearchParams(window.location.search);
    const pre = params.get('url');
    if (pre) {
      input.value = pre;
      sub.textContent = '已从邮件或笔记预填地址。请确认后点「前往」——不会自动跳转。';
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      navigate(input.value);
    });

    renderHist();
  </script>
</body>
</html>
