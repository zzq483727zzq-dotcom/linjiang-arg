<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>顾深</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <link rel="stylesheet" href="/assets/css/theme-phone.css" />
</head>
<body data-site="phone">
  <div class="phone-frame">
    <div class="phone-notch" aria-hidden="true"></div>
    <div class="phone-screen wx-app">
      <div class="phone-status">
        <span>中国移动</span>
        <span class="phone-status-time">22:17</span>
        <span class="phone-status-icons" aria-hidden="true">
          <i class="sig"></i><i class="wifi"></i><i class="bat"></i>
        </span>
      </div>

      <div class="wx-top">
        <a class="wx-back" href="/phone/wechat.html" aria-label="返回">‹</a>
        <div class="wx-title">顾深</div>
        <div class="wx-right" aria-hidden="true">···</div>
      </div>

      <div class="wx-body is-chat">
        <div class="wx-chat">
          <div class="wx-day"><span>3月18日 晚上 20:14</span></div>

          <div class="wx-msg mine">
            <div class="wx-avatar av-me" aria-hidden="true">我</div>
            <div>
              <div class="wx-bubble">深哥，林屿最近你联系上没</div>
            </div>
          </div>

          <div class="wx-msg theirs">
            <div class="wx-avatar av-gu" aria-hidden="true">深</div>
            <div>
              <div class="wx-bubble">他微信偶尔回两句，怪简短的</div>
            </div>
          </div>

          <div class="wx-msg mine">
            <div class="wx-avatar av-me" aria-hidden="true">我</div>
            <div>
              <div class="wx-bubble">他之前说失眠，后来就失踪式消失好几天</div>
            </div>
          </div>

          <div class="wx-msg theirs">
            <div class="wx-avatar av-gu" aria-hidden="true">深</div>
            <div>
              <div class="wx-bubble">他妈说他回来了，状态好很多</div>
            </div>
          </div>

          <div class="wx-msg theirs">
            <div class="wx-avatar av-gu" aria-hidden="true">深</div>
            <div>
              <div class="wx-bubble">还发朋友圈了，笑得挺假……也可能是我想多了</div>
            </div>
          </div>

          <div class="wx-msg mine">
            <div class="wx-avatar av-me" aria-hidden="true">我</div>
            <div>
              <div class="wx-bubble">你当面见过他吗</div>
            </div>
          </div>

          <div class="wx-msg theirs">
            <div class="wx-avatar av-gu" aria-hidden="true">深</div>
            <div>
              <div class="wx-bubble">没有。约他出来总说在休息，改天再说</div>
            </div>
          </div>

          <div class="wx-msg theirs">
            <div class="wx-avatar av-gu" aria-hidden="true">深</div>
            <div>
              <div class="wx-bubble">你别只看朋友圈</div>
            </div>
          </div>

          <div class="wx-msg mine">
            <div class="wx-avatar av-me" aria-hidden="true">我</div>
            <div>
              <div class="wx-bubble">什么意思</div>
            </div>
          </div>

          <div class="wx-msg theirs">
            <div class="wx-avatar av-gu" aria-hidden="true">深</div>
            <div>
              <div class="wx-bubble">就是……图看着挺完美，话也对，就是不太像他本人。你懂吧</div>
            </div>
          </div>

          <div class="wx-msg theirs">
            <div class="wx-avatar av-gu" aria-hidden="true">深</div>
            <div>
              <div class="wx-bubble">算了，我可能神经过敏。你要是担心就多找他唠两句</div>
            </div>
          </div>

          <div class="wx-day"><span>周一 22:08</span></div>

          <div class="wx-msg theirs">
            <div class="wx-avatar av-gu" aria-hidden="true">深</div>
            <div>
              <div class="wx-bubble">对了，他那颗左眼底下的痣，你还记得吧。最近照片我怎么都没看出来</div>
            </div>
          </div>

          <div class="wx-sys"><span>以上为聊天记录</span></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module">
    import { boot } from '/assets/js/nav.js';
    boot('chat-gu');
  </script>
</body>
</html>
