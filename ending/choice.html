<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>选择 · 终局</title>
  <link rel="stylesheet" href="/assets/css/theme-ending.css" />
</head>
<body class="end-body end-choice" data-site="ending" data-page="choice">
  <main class="choice-shell" id="choice-root" hidden>
    <p class="choice-kicker">ENDING · BRANCH</p>
    <h1 class="choice-title">你还要怎么做？</h1>
    <p class="choice-lead">
      原来的人已经回不来了。外面的「他」还在回消息，系统也记下了你。
      你要怎么收场。
    </p>

    <div class="choice-list" role="list">
      <a class="choice-card" href="/ending/reveal.html" data-end="reveal" role="listitem">
        <span class="label">拆穿</span>
        <span class="hint">留下证据，说给别人听。救不回人，但不装看不见。</span>
      </a>
      <a class="choice-card" href="/ending/silent.html" data-end="silent" role="listitem">
        <span class="label">沉默</span>
        <span class="hint">关掉页面，不再追问。朋友圈还会更新。</span>
      </a>
      <a class="choice-card" href="/ending/enrolled.html" data-end="enrolled" role="listitem">
        <span class="label">被写下</span>
        <span class="hint">接受他们的「优先评估」。名册收束到你自己。</span>
      </a>
    </div>

    <p id="choice-err" class="choice-err" hidden></p>
  </main>

  <script type="module">
    import { boot, getState } from '/assets/js/nav.js';
    boot('ending-choice');

    const api = getState();
    const s = api?.all() || {};
    const params = new URLSearchParams(location.search);
    const dev = params.get('dev') === '1';
    const allowed = !!(s.staffAccess || s.flagged || s.truthSeen || dev || s.ending);

    if (!allowed) {
      location.replace('/');
    } else {
      document.getElementById('choice-root').hidden = false;

      document.querySelectorAll('.choice-card[data-end]').forEach((a) => {
        a.addEventListener('click', (e) => {
          // let navigation proceed; set ending first
          const id = a.getAttribute('data-end');
          try {
            getState()?.setEnding(id);
          } catch (err) {
            document.getElementById('choice-err').hidden = false;
            document.getElementById('choice-err').textContent = '进度写入失败，仍尝试进入结局页…';
          }
          // default follow href
        });
      });
    }
  </script>
</body>
</html>
