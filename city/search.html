<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>站内搜索 — 临江市人民政府</title>
  <link rel="stylesheet" href="/linjiang-arg/assets/css/theme-city.css" />
</head>
<body class="city-body search-page" data-site="city">
  <div class="city-topbar">
    <div class="city-topbar-inner">
      <span>中华人民共和国 · 临江市</span>
      <span>
        <a href="/linjiang-arg/city/">首页</a> ·
        <a href="/linjiang-arg/city/search.html">站内搜索</a> ·
        <a href="/linjiang-arg/city/intranet/login.html">办公系统</a>
      </span>
    </div>
  </div>

  <header class="city-banner">
    <div class="city-banner-inner">
      <div class="city-emblem" aria-hidden="true">临江</div>
      <div>
        <h1>临江市人民政府</h1>
        <p class="sub">站内搜索</p>
      </div>
    </div>
  </header>

  <nav class="city-nav" aria-label="站点导航">
    <div class="city-nav-inner">
      <a href="/linjiang-arg/city/">首页</a>
      <a class="active" href="/linjiang-arg/city/search.html">搜索</a>
      <a href="/linjiang-arg/city/news-pilot.html">卫生健康</a>
      <a href="/linjiang-arg/city/intranet/login.html">办公系统</a>
    </div>
  </nav>

  <div class="city-searchbar">
    <form action="/linjiang-arg/city/search.html" method="get" role="search" id="search-form">
      <label class="visually-hidden" for="q">搜索</label>
      <input id="q" name="q" type="search" placeholder="请输入关键词" />
      <button type="submit">搜索</button>
    </form>
  </div>

  <main class="city-wrap">
    <p class="query-echo" id="query-echo"></p>
    <div id="results"></div>
  </main>

  <footer class="city-footer">
    <div class="city-footer-inner">
      <div class="links">
        <a href="/linjiang-arg/city/">网站首页</a>
        <a href="/linjiang-arg/city/search.html">站内搜索</a>
        <a href="/linjiang-arg/city/intranet/login.html">办公系统</a>
      </div>
      <div>主办：临江市人民政府办公室</div>
      <div class="icp">网站标识码 0000000000　备案号：临ICP备00000000号-1</div>
      <div class="icp">© 临江市人民政府　内容仅供 ARG 叙事演示</div>
    </div>
  </footer>

  <script type="module">
    import { boot } from '/linjiang-arg/assets/js/nav.js';
    import { searchArticles, queryFromLocation } from '/linjiang-arg/assets/js/city-search.js';
    boot('city-search');

    const q = queryFromLocation();
    const input = document.getElementById('q');
    input.value = q;

    const echo = document.getElementById('query-echo');
    const box = document.getElementById('results');

    const results = searchArticles(q);

    if (!q) {
      echo.innerHTML = '请输入关键词后点击搜索。';
    } else {
      echo.innerHTML = `关键词 <b>${escapeHtml(q)}</b>　共找到 <b>${results.length}</b> 条结果`;
    }

    if (!results.length) {
      box.innerHTML = `<div class="no-results">未检索到与“${escapeHtml(q || '…')}”相关的公开信息。<br/>您可更换关键词，或返回<a href="/linjiang-arg/city/">首页</a>浏览要闻。</div>`;
    } else {
      box.innerHTML = `<ul class="result-list">${results
        .map(
          (a) => `<li class="result-item">
            <h3><a href="${a.href}">${escapeHtml(a.title)}</a></h3>
            <p class="summary">${escapeHtml(a.summary)}</p>
            <div class="meta">
              <span>${escapeHtml(a.date)}</span> ·
              <span>${escapeHtml(a.source || '')}</span>
              ${(a.tags || []).map((t) => `<span class="tag">#${escapeHtml(t)}</span>`).join('')}
            </div>
          </li>`
        )
        .join('')}</ul>`;
    }

    function escapeHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
