<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>备忘 · 临江</title>
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/theme-intro.css" />
</head>
<body data-site="intro">
  <main class="intro-wrap">
    <p class="intro-kicker">私人备忘 · 临江</p>
    <h1>关于林屿</h1>
    <div class="intro-body">
      <p>林屿是我的朋友。我们在临江认识，不算最熟的那种，但消息一直没断过。</p>
      <p>
        前阵子他忽然消失过一阵——微信不回，电话也打不通。
        后来又「回来了」：会回消息，朋友圈也在更，身边人都说他状态比以前好。
      </p>
      <p>
        可我总觉得不对。他回得太短、太稳，像在应付；约他见面总推脱；
        偶尔对上线，也像隔着一层玻璃。疏远，却又说不出哪里病了。
      </p>
      <p>
        顾深说他家人觉得他变好了。我越听越不踏实。
        与其只听别人讲，不如自己查：他失联前后到底发生了什么。
      </p>
      <p>先从他手机里那些还在用的东西开始——聊天、朋友圈，以及误发到我这里的邮件。</p>
    </div>
    <label class="intro-name">
      你的名字
      <input id="player-name" maxlength="6" placeholder="陈知夏" autocomplete="off" />
    </label>
    <button type="button" id="start-btn" class="intro-start">开始调查</button>
  </main>
  <script type="module">
    import { boot, getState } from '/assets/js/nav.js';
    boot('intro');
    const input = document.getElementById('player-name');
    const saved = getState()?.all()?.playerName;
    if (saved) input.value = saved;
    document.getElementById('start-btn').addEventListener('click', () => {
      const raw = (input.value || '').trim();
      getState()?.setPlayerName(raw || '陈知夏');
      location.href = '/phone/';
    });
  </script>
</body>
</html>
